# ─────────────────────────────────────────────────────────────────────
# packages.yml — dbt package dependencies
# Run: dbt deps   (to install)
# ─────────────────────────────────────────────────────────────────────

packages:
  # dbt_utils: essential utility macros (date_spine, surrogate_key, etc.)
  - package: dbt-labs/dbt_utils
    version: [">=1.1.0", "<2.0.0"]

  # dbt_expectations: Great Expectations-style data quality tests
  - package: calogica/dbt_expectations
    version: [">=0.10.0", "<1.0.0"]

  # codegen: auto-generates source YAML from your database (massive time saver)
  - package: dbt-labs/codegen
    version: [">=0.12.0", "<1.0.0"]
